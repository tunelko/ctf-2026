name: "sym-jail"
description: "jail"
mode: ONCE

uidmap { inside_id: "1000" }
gidmap { inside_id: "1000" }

# --- MONTAJES ---
mount { src: "/bin", dst: "/bin", is_bind: true }
mount { src: "/usr/bin", dst: "/usr/bin", is_bind: true }
mount { src: "/lib", dst: "/lib", is_bind: true }
mount { src: "/lib64", dst: "/lib64", is_bind: true }

mount { src: "/challenge", dst: "/challenge", is_bind: true }

mount { src: "/flag.txt", dst: "/flag.txt", is_bind: true }
mount { dst: "/tmp", fstype: "tmpfs", rw: true }
mount { src: "/dev/null", dst: "/dev/null", is_bind: true }

time_limit: 300
rlimit_as: 64
